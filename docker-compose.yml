services:

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-gsa_db}
      POSTGRES_USER:     ${DB_USER:-gsa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obbligatoria nel file .env}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gsa_user} -d ${DB_NAME:-gsa_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:    3001
      DB_HOST: db
      DB_PORT: 5432
      DB_SSL:  "false"
    volumes:
      - storage_pdf:/app/storage/pdf
      - storage_archivio:/app/storage/archivio

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  pgdata:
  storage_pdf:
  storage_archivio:
