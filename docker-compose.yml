services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       gsa_db_2
      POSTGRES_USER:     gsa_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsa_user -d gsa_db_2"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:             3001
      DB_HOST:          db
      DB_PORT:          5432
      DB_NAME:          gsa_db_2
      DB_USER:          gsa_user
      DB_PASSWORD:      changeme
      DB_SSL:           "false"
      MAX_FILE_SIZE:    20971520
      OCR_MIN_CHARS:    120
      TESSERACT_LANG:   ita
    volumes:
      - storage_pdf:/app/storage/pdf
      - storage_archivio:/app/storage/archivio

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  storage_pdf:
  storage_archivio:
