services:

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-gsa_db}
      POSTGRES_USER:     ${DB_USER:-gsa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obbligatoria nel file .env}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gsa_user} -d ${DB_NAME:-gsa_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend v1 (legacy) ───────────────────────────────────────────────────────
  backend-v1:
    build:
      context: .
      dockerfile: v1/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      V1_PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_SSL:  "false"
      FRONTEND_URL: ${FRONTEND_V1_URL:-http://localhost}
    volumes:
      - storage_pdf:/app/storage/pdf
      - storage_archivio:/app/storage/archivio

  # ── Backend v2 (DDD) ──────────────────────────────────────────────────────────
  backend-v2:
    build:
      context: .
      dockerfile: v2/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      V2_PORT: 3002
      DB_HOST: db
      DB_PORT: 5432
      DB_SSL:  "false"
      FRONTEND_V2_URL: ${FRONTEND_V2_URL:-http://localhost:8081}
    volumes:
      - storage_pdf:/app/storage/pdf
      - storage_archivio:/app/storage/archivio

  # ── Frontend v1 ───────────────────────────────────────────────────────────────
  frontend-v1:
    build: ./v1/frontend
    restart: unless-stopped
    depends_on:
      - backend-v1
    ports:
      - "${HTTP_PORT:-80}:80"

  # ── Frontend v2 ───────────────────────────────────────────────────────────────
  frontend-v2:
    build: ./v2/frontend
    restart: unless-stopped
    depends_on:
      - backend-v2
    ports:
      - "${HTTP_V2_PORT:-8081}:80"

volumes:
  pgdata:
  storage_pdf:
  storage_archivio:
